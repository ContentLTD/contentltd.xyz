  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap"></noscript>

  <style>
    :root {
      --base:         #0d0b0a;
      --surface:      #161311;
      --surface-2:    #1e1a17;
      --surface-3:    #252017;
      --text:         #e8e2db;
      --text-2:       #a69f95;
      --text-3:       #6b645c;
      --accent:       #c4683a;
      --accent-soft:  rgba(196, 104, 58, 0.14);
      --accent-hover: rgba(196, 104, 58, 0.22);
      --rule:         rgba(255, 255, 255, 0.06);
      --radius:       10px;
      --ease-out:     cubic-bezier(0.22, 1, 0.36, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: rgba(196, 104, 58, 0.35); color: var(--text); }
    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-synthesis: none;
      background: var(--base);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Top bar ──────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 56px;
      background: rgba(13, 11, 10, 0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--rule);
    }

    .topbar-back {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-2);
      transition: color 160ms ease;
    }

    .topbar-back:hover { color: var(--text); }

    .topbar-back svg {
      transition: transform 160ms var(--ease-out);
    }
    .topbar-back:hover svg { transform: translateX(-3px); }

    .topbar-label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-3);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── Page layout ──────────────────────────────── */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 48px 120px;
    }

    /* ── Page header ──────────────────────────────── */
    .page-header {
      margin-bottom: 72px;
    }

    .page-header h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      font-weight: 400;
      letter-spacing: -0.025em;
      line-height: 1.1;
      color: var(--text);
    }

    .page-header p {
      margin-top: 14px;
      font-size: 1rem;
      color: var(--text-2);
      max-width: 480px;
      line-height: 1.65;
    }

    /* ── Section label ────────────────────────────── */
    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 28px;
    }

    /* ── Featured grid ────────────────────────────── */
    .featured-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      margin-bottom: 80px;
    }

    /* ── Project card ─────────────────────────────── */
    .project-card {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 200ms ease, transform 200ms var(--ease-out), box-shadow 200ms ease;
      cursor: default;
    }

    .project-card:hover {
      border-color: rgba(255, 255, 255, 0.10);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45), 0 2px 8px rgba(0, 0, 0, 0.25);
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: var(--surface-2);
      overflow: hidden;
      position: relative;
      border-bottom: 1px solid var(--rule);
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 320ms var(--ease-out), opacity 200ms ease;
    }

    .project-card:hover .card-thumb img {
      transform: scale(1.025);
    }

    /* Placeholder shown when no thumbnail */
    .card-thumb-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-thumb-placeholder svg {
      opacity: 0.18;
    }

    .card-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 10px;
    }

    .card-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--text-2);
      line-height: 1.6;
      flex: 1;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      background: var(--surface-2);
      border: 1px solid var(--rule);
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-2);
      letter-spacing: 0.01em;
      line-height: 1.6;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-top: 1px solid var(--rule);
      gap: 10px;
    }

    .card-live-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--accent);
      transition: color 150ms ease, gap 150ms var(--ease-out);
    }

    .card-live-link:hover {
      color: #d9845a;
      gap: 9px;
    }

    .card-case-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-3);
      padding: 5px 10px;
      border: 1px solid var(--rule);
      border-radius: 5px;
      transition: color 150ms ease, border-color 150ms ease, background 150ms ease;
    }

    .card-case-link:hover {
      color: var(--text-2);
      border-color: rgba(255, 255, 255, 0.12);
      background: var(--surface-2);
    }

    /* ── All projects list ────────────────────────── */
    .all-projects-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 18px 22px;
      background: var(--surface);
      transition: background 150ms ease;
    }

    .list-item + .list-item {
      border-top: 1px solid var(--rule);
    }

    .list-item:hover { background: var(--surface-2); }

    .list-thumb-sm {
      width: 56px;
      height: 36px;
      border-radius: 5px;
      background: var(--surface-2);
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--rule);
    }

    .list-thumb-sm img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .list-info {
      flex: 1;
      min-width: 0;
    }

    .list-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-desc {
      font-size: 0.8rem;
      color: var(--text-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    .list-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      flex-shrink: 0;
    }

    .list-link {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--accent);
      transition: color 150ms ease;
    }

    .list-link:hover { color: #d9845a; }

    /* ── Empty state ──────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-3);
      font-size: 0.9rem;
    }

    /* ── Footer ───────────────────────────────────── */
    .page-footer {
      margin-top: 96px;
      padding-top: 28px;
      border-top: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .page-footer p {
      font-size: 0.78rem;
      color: var(--text-3);
    }

    .page-footer a {
      color: var(--text-2);
      transition: color 150ms ease;
    }

    .page-footer a:hover { color: var(--text); }

    /* ── Loading skeleton ─────────────────────────── */
    @keyframes skeleton-pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }

    .skeleton {
      background: var(--surface-2);
      border-radius: 4px;
      animation: skeleton-pulse 1.6s ease-in-out infinite;
    }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 768px) {
      .topbar { padding: 0 20px; }
      .page { padding: 56px 20px 96px; }
      .page-header { margin-bottom: 48px; }
      .featured-grid { grid-template-columns: 1fr; gap: 16px; }
      .list-item { flex-wrap: wrap; gap: 12px; }
      .list-tags { display: none; }
    }

    @media (max-width: 500px) {
      .topbar-label { display: none; }
    }
  </style>
</head>
<body>

  
  <header class="topbar" role="banner">
    <a href="/" class="topbar-back" aria-label="Back to contentltd.xyz">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 2L4 7l5 5"/>
      </svg>
      contentltd.xyz
    </a>
    <span class="topbar-label">Work</span>
  </header>

  <main class="page" id="main">

    
    <header class="page-header">
      <h1>Work</h1>
      <p>Websites and applications I've designed and built.</p>
    </header>

    
    <section aria-label="Featured projects">
      <p class="section-label">Featured Projects</p>
      <div class="featured-grid" id="featured-grid">
        
      </div>
    </section>

    
    <section aria-label="All projects" id="all-section">
      <p class="section-label">All Projects</p>
      <div class="all-projects-list" id="all-list">
        
      </div>
    </section>

    
    <footer class="page-footer">
      <p>© <span id="year"></span> ContentLTD</p>
      <p><a href="/">contentltd.xyz</a></p>
    </footer>

  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // ── Tag icon map (inline SVG snippets) ────────────────────────────────
    const TAG_ICONS = {
      'HTML': `<svg width="10" height="10" viewBox="0 0 512 512" aria-hidden="true"><path fill="#e34c26" d="M64 32l34.9 395.8L256 480l157.1-52.2L448 32H64zm308 132H188l4 51h176l-13.6 148.4L256 393.2l-98.7-61.5-6.5-71.2h49l3.4 37.9 52.8 14.3 52.7-14.3 5.5-59.2H144.3l-12.2-131.6h248.4l-8.5 91.6z"/></svg>`,
      'CSS': `<svg width="10" height="10" viewBox="0 0 512 512" aria-hidden="true"><path fill="#264de4" d="M64 32l34.9 395.8L256 480l157.1-52.2L448 32H64zm307.8 132.5l-4.3 47.4H184.6l4.3 47.4h178.6l-13.4 148.4-98 27.3-97.7-27.3-6.3-71.2h47.4l3.4 37.9 53.2 14.4 53.5-14.4 5.5-61.6H149.4l-12.2-131.6h237.6z"/></svg>`,
      'JS': `<svg width="10" height="10" viewBox="0 0 630 630" aria-hidden="true"><rect width="630" height="630" fill="#f7df1e" rx="4"/><path d="M165.65 526.47l48.2-29.18c9.3 16.5 17.77 30.48 38.09 30.48 19.48 0 31.77-7.62 31.77-37.25V258.42h59.2v233.6c0 61.32-35.94 89.2-88.38 89.2-47.36 0-74.92-24.52-88.88-54.75M375.58 516.13l48.2-27.9c12.73 20.75 29.25 36.02 58.42 36.02 24.52 0 40.19-12.28 40.19-29.25 0-20.29-16.1-27.45-43.2-39.27l-14.82-6.37c-42.75-18.18-71.13-40.95-71.13-89.2 0-44.41 33.84-78.24 86.74-78.24 37.64 0 64.73 13.08 84.18 47.36l-46.07 29.55c-10.15-18.18-21.08-25.34-38.11-25.34-17.37 0-28.34 11-28.34 25.34 0 17.75 10.96 24.91 36.26 35.89l14.82 6.37c50.34 21.55 78.71 43.55 78.71 92.85 0 53.15-41.75 82.54-97.82 82.54-54.84 0-90.3-26.12-107.64-60.3"/></svg>`,
      'Cloudflare Workers': `<svg width="10" height="10" viewBox="0 0 512 512" aria-hidden="true" fill="#f6821f"><path d="M363.6 345.2c2.4-8.1 1.5-15.6-2.6-21.1-3.7-5-9.7-7.9-17-8.2l-195.3-2.5c-1.3 0-2.4-.7-3-1.7-.6-1.1-.6-2.4.1-3.4 1.3-2 3.5-3.2 5.9-3.2l197.1-2.5c23.4-1.1 48.7-20 57.6-43.1l11.3-29.4c.5-1.3.7-2.6.4-3.9C398.3 170.8 354 136 301.1 136c-46.2 0-85.9 27-105.3 66.4-9.7-7.2-21.7-11.4-34.7-11c-25.5.8-46.1 21.1-47.7 46.6-.4 5.5 0 10.9 1.1 16C89.8 256.8 68 279.4 68 307.3c0 1.4.1 2.8.2 4.2.3 1.4 1.5 2.4 2.9 2.4h285c1.6 0 3-1.1 3.5-2.6l4-16.1z"/></svg>`,
      'KV': `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#f6821f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/></svg>`,
      'Node.js': `<svg width="10" height="10" viewBox="0 0 32 32" aria-hidden="true"><path fill="#84BA64" d="M16 2L2 10v12l14 8 14-8V10L16 2zm0 2.3l11.6 6.7v11.3L16 28.4 4.4 22.3V11L16 4.3z"/></svg>`,
    };

    function buildTagHtml(tags) {
      return tags.map(t => {
        const icon = TAG_ICONS[t] || '';
        return `<span class="tag">${icon}${t}</span>`;
      }).join('');
    }

    function buildFeaturedCard(site) {
      const hasCaseStudy = !!site.caseStudy;
      const thumbHtml = site.thumbnail
        ? `<img src="${site.thumbnail}" alt="${site.name} screenshot" loading="lazy" decoding="async" onerror="this.style.display='none'">`
        : `<div class="card-thumb-placeholder"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></div>`;

      return `
        <article class="project-card">
          <div class="card-thumb">${thumbHtml}</div>
          <div class="card-body">
            <h2 class="card-name">${site.name}</h2>
            <p class="card-desc">${site.description}</p>
            <div class="card-tags">${buildTagHtml(site.tags)}</div>
          </div>
          <div class="card-footer">
            <a href="${site.url}" target="_blank" rel="noopener noreferrer" class="card-live-link" aria-label="Visit ${site.name}">
              Visit site
              <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 10L10 2M5 2h5v5"/>
              </svg>
            </a>
            ${hasCaseStudy ? `<a href="${site.caseStudy}" class="card-case-link">Case study →</a>` : ''}
          </div>
        </article>
      `;
    }

    function buildListItem(site) {
      const thumbHtml = site.thumbnail
        ? `<img src="${site.thumbnail}" alt="" loading="lazy" decoding="async" onerror="this.style.display='none'">`
        : '';

      return `
        <div class="list-item">
          <div class="list-thumb-sm">${thumbHtml}</div>
          <div class="list-info">
            <div class="list-name">${site.name}</div>
            <div class="list-desc">${site.description}</div>
          </div>
          <div class="list-tags">${buildTagHtml(site.tags)}</div>
          <a href="${site.url}" target="_blank" rel="noopener noreferrer" class="list-link" aria-label="Visit ${site.name}">
            Visit
            <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2 10L10 2M5 2h5v5"/>
            </svg>
          </a>
        </div>
      `;
    }

    async function loadProjects() {
      const featuredGrid = document.getElementById('featured-grid');
      const allList = document.getElementById('all-list');
      const allSection = document.getElementById('all-section');

      try {
        const res = await fetch('/work/sites.json');
        if (!res.ok) throw new Error('Failed to load sites.json');
        const sites = await res.json();

        const featured = sites.filter(s => s.featured);
        const rest = sites.filter(s => !s.featured);

        if (featured.length === 0) {
          featuredGrid.innerHTML = '<p class="empty-state">No featured projects yet.</p>';
        } else {
          featuredGrid.innerHTML = featured.map(buildFeaturedCard).join('');
        }

        if (rest.length === 0) {
          allSection.style.display = 'none';
        } else {
          allList.innerHTML = rest.map(buildListItem).join('');
        }
      } catch (err) {
        console.error(err);
        featuredGrid.innerHTML = '<p class="empty-state">Could not load projects.</p>';
        allSection.style.display = 'none';
      }
    }

    loadProjects();
  </script>
</body>
</html>
