<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="warm" cx="28%" cy="22%" r="58%" gradientUnits="userSpaceOnUse"
                    fx="28%" fy="22%" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%"   stop-color="#c4683a" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0d0b0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool" cx="82%" cy="84%" r="48%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4a8c5c" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0d0b0a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- base -->
  <rect width="512" height="512" fill="#0d0b0a"/>
  <!-- warm top-left blush -->
  <rect width="512" height="512" fill="url(#warm)"/>
  <!-- cool bottom-right hint -->
  <rect width="512" height="512" fill="url(#cool)"/>

  <!-- "C" in white, "." in burnt orange — Instrument Serif italic -->
  <text
    x="148" y="338"
    font-family="'Instrument Serif', 'Iowan Old Style', 'Palatino Linotype', Georgia, serif"
    font-style="italic"
    font-weight="400"
    font-size="268"
    fill="#f0ebe4"
    text-anchor="start"
    dominant-baseline="auto"
    letter-spacing="-4"
  >C</text>
  <text
    x="330" y="338"
    font-family="'Instrument Serif', 'Iowan Old Style', 'Palatino Linotype', Georgia, serif"
    font-style="italic"
    font-weight="400"
    font-size="268"
    fill="#c4683a"
    text-anchor="start"
    dominant-baseline="auto"
  >.</text>
</svg>
