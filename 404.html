    <link rel="stylesheet" href="https://contentltd.xyz/index.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #000;
        }

        .anchor-container {
            position: fixed;
            left: 20px;
            bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding-bottom: 71px;
        }
        
        .anchor-image {
            height: 90px;
            width: auto;
        }
        
        .code-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
            align-items: center;
        }
        
        .code-box {
            background-color: rgba(0,0,0,0.5);
            border: 2px solid #dffccb;
            border-radius: 5px;
            padding: 0;
            color: #dffccb;
            text-align: center;
        }
        
        .letter {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 28px;
            width: 40px;
            height: 40px;
            line-height: 40px;
        }
        
        .number {
            font-family: 'Roboto', sans-serif;
            font-weight: 400;
            font-size: 36px;
            width: 110px;
            height: 40px;
            line-height: 40px;
            letter-spacing: 4px;
        }
        
        #cba {
            margin-bottom: 12px;
        }
        
        @media only screen and (max-width: 600px) {
            .anchor-container {
                display: none !important;
            }
        }

        .error-container {
            max-width: 414px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        .error-header {
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .error-code-display {
            font-family: 'Oswald', sans-serif;
            font-size: 120px;
            font-weight: 700;
            color: #e2ccc3;
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(226, 204, 195, 0.3);
        }

        .error-title {
            font-family: 'Oswald', sans-serif;
            font-size: 32px;
            color: #fff;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .error-description {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            color: #888;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .error-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .error-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: #e2ccc3;
            color: #000;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .error-button:hover {
            background-color: #d4bfb0;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(226, 204, 195, 0.3);
        }

        .error-button.secondary {
            background-color: transparent;
            color: #e2ccc3;
            border: 2px solid #e2ccc3;
        }

        .error-button.secondary:hover {
            background-color: rgba(226, 204, 195, 0.1);
            transform: translateY(-2px);
        }

        .profile-section {
            margin-top: 40px;
            padding: 20px;
            background: rgba(20, 20, 20, 0.6);
            border-radius: 12px;
            border: 1px solid #333;
        }

        .profile-mini {
            display: flex;
            align-items: center;
            gap: 15px;
            justify-content: center;
        }

        .profile-mini-pic {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid #e2ccc3;
            overflow: hidden;
        }

        .profile-mini-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-mini-info h2 {
            font-family: 'Oswald', sans-serif;
            font-size: 20px;
            color: #e2ccc3;
            margin-bottom: 5px;
        }

        .profile-mini-info p {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: #888;
            margin: 0;
        }

        .footer-404 {
            text-align: center;
            padding: 30px 20px;
            margin-top: 40px;
        }

        .footer-404 p {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            color: #888;
            margin: 5px 0;
        }

        .footer-404 a {
            color: #e2ccc3;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-404 a:hover {
            color: #d4bfb0;
        }

        .loading-skeleton {
            background: linear-gradient(90deg, #333 25%, #444 50%, #333 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
            border-radius: 8px;
            height: 20px;
            width: 150px;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

<body>
    
    <div class="anchor-container">
        <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/anchor-code-removebg-preview-pa1-KTxBGx9yMqzBY4lVDeidqGlAKwN8tM.png" class="anchor-image" alt="Anchor graphic">
        <div class="code-container">
            <div class="code-box letter" id="cba">X</div>
            <div class="code-box number">404</div>
        </div>
    </div>

    <div class="error-container">
        <div class="error-header">
            <div class="error-code-display">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-description">
                Oops! Looks like you've ventured into uncharted territory. 
                The page you're looking for doesn't exist or has been moved.
            </p>
        </div>

        <div class="error-buttons">
            <a href="https://contentltd.xyz" class="error-button">
                Return Home
            </a>
            <a href="javascript:history.back()" class="error-button secondary">
                Go Back
            </a>
        </div>

        <div class="profile-section">
            <div class="profile-mini">
                <div class="profile-mini-pic">
                    <img id="profileImage" src="https://profileapi.contentltd.xyz/pfp/image.png" alt="ContentLTD">
                </div>
                <div class="profile-mini-info">
                    <h2 id="profileName">ContentLTD</h2>
                    <p id="profileStatus">Loading profile...</p>
                </div>
            </div>
        </div>

        <div class="footer-404">
            <p><a href="https://contentltd.net" target="_blank">A ContentLTD Product</a></p>
            <p>Stay Tuned. Something's Happening...</p>
            <p>&copy; <span id="copyright-year"></span> ContentLTD<sup>℠</sup>. All rights reserved.</p>
        </div>
    </div>

    <script>

        class ProfileManager {
            constructor() {
                this.apiBase = 'https://profileapi.contentltd.xyz';
                this.cache = new Map();
                this.cacheTTL = 5 * 60 * 1000;
                this.init();
            }

            async init() {
                try {
                    await this.loadProfile();
                } catch (error) {
                    console.error('Failed to load profile:', error);
                    this.showFallback();
                }
            }

            async loadProfile() {
                const cached = this.getFromCache('profile');
                if (cached) {
                    this.updateUI(cached);
                    return;
                }

                try {
                    const profileResponse = await fetch(`${this.apiBase}/api/discord-profile`, {
                        method: 'GET',
                        headers: { 'Accept': 'application/json' }
                    });

                    if (!profileResponse.ok) {
                        throw new Error(`Profile API returned ${profileResponse.status}`);
                    }

                    const profileData = await profileResponse.json();
                    this.setCache('profile', profileData);
                    this.updateUI(profileData);
                    await this.loadProfilePicture();
                } catch (error) {
                    console.error('Profile loading error:', error);
                    this.showFallback();
                }
            }

            async loadProfilePicture() {
                try {
                    const profileImage = document.getElementById('profileImage');
                    const imageUrl = `${this.apiBase}/pfp/image.png?t=${Date.now()}`;
                    
                    const img = new Image();
                    img.onload = () => {
                        profileImage.src = imageUrl;
                    };
                    img.onerror = () => {
                        console.warn('Failed to load profile picture');
                    };
                    img.src = imageUrl;
                } catch (error) {
                    console.error('Failed to load profile picture:', error);
                }
            }

            updateUI(profileData) {
                const profileName = document.getElementById('profileName');
                const profileStatus = document.getElementById('profileStatus');

                profileName.textContent = profileData.globalName || profileData.username || 'ContentLTD';
                
                const lastUpdated = new Date(profileData.lastUpdated);
                const timeAgo = this.getTimeAgo(lastUpdated);
                profileStatus.textContent = `Last updated ${timeAgo}`;
            }

            showFallback() {
                const profileName = document.getElementById('profileName');
                const profileStatus = document.getElementById('profileStatus');

                profileName.textContent = 'ContentLTD';
                profileStatus.textContent = 'Profile loaded';
            }

            getTimeAgo(date) {
                const now = new Date();
                const diffInSeconds = Math.floor((now - date) / 1000);

                if (diffInSeconds < 60) return 'just now';
                if (diffInSeconds < 3600) return `${Math.floor(diffInSeconds / 60)}m ago`;
                if (diffInSeconds < 86400) return `${Math.floor(diffInSeconds / 3600)}h ago`;
                return `${Math.floor(diffInSeconds / 86400)}d ago`;
            }

            getFromCache(key) {
                const cached = this.cache.get(key);
                if (!cached) return null;

                if (Date.now() > cached.expiry) {
                    this.cache.delete(key);
                    return null;
                }

                return cached.data;
            }

            setCache(key, data) {
                this.cache.set(key, {
                    data,
                    expiry: Date.now() + this.cacheTTL
                });
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                new ProfileManager();
            });
        } else {
            new ProfileManager();
        }

        document.addEventListener('DOMContentLoaded', function() {
            var yearSpan = document.getElementById('copyright-year');
            if (yearSpan) yearSpan.textContent = new Date().getFullYear();
        });
    </script>
