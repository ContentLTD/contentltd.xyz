<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — ContentLTD</title>

  <meta name="robots" content="noindex, follow">
  <meta name="googlebot" content="noindex, follow">

  <meta property="og:title" content="404 — ContentLTD">
  <meta property="og:description" content="This page got sunsetted.">
  <meta property="og:url" content="https://contentltd.xyz">
  <meta property="og:type" content="website">

  <link rel="icon" type="image/png" href="https://profileapi.contentltd.xyz/pfp/image.png">
  <link rel="apple-touch-icon" href="https://profileapi.contentltd.xyz/pfp/image.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:wght@400;500;600&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:wght@400;500;600&display=swap"></noscript>

  <link rel="preload" href="/index.css" as="style">
  <link rel="stylesheet" href="/index.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .page-404 {
      width: 100%;
      max-width: 480px;
      text-align: left;
      animation: reveal 320ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .err-code {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(5rem, 20vw, 8rem);
      font-weight: 400;
      line-height: 1;
      color: var(--accent);
      letter-spacing: -0.04em;
    }

    .err-rule {
      border: none;
      height: 1px;
      background: var(--rule);
      margin: 20px 0;
    }

    .err-heading {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .err-desc {
      font-size: 0.9rem;
      color: var(--text-2);
      line-height: 1.65;
      text-wrap: pretty;
      max-width: 36ch;
    }

    .err-actions {
      display: flex;
      gap: 10px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .err-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 6px;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 150ms, transform 150ms;
      text-decoration: none;
    }

    .err-btn:active { transform: scale(0.97); }

    .err-btn-primary {
      background: var(--accent);
      color: #faf6f1;
      border: none;
    }

    .err-btn-primary:hover { opacity: 0.88; }

    .err-btn-secondary {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--rule);
    }

    .err-btn-secondary:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

    .err-btn-secondary:focus-visible,
    .err-btn-primary:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .err-path {
      margin-top: 28px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 6px;
      font-size: 0.75rem;
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 8px;
      overflow: hidden;
    }

    .err-path-label {
      flex-shrink: 0;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.6rem;
      color: var(--text-3);
    }

    .err-path-value {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-2);
      font-style: italic;
    }

    .err-footer {
      margin-top: 40px;
      font-size: 0.65rem;
      color: var(--text-3);
      line-height: 1.7;
    }

    .err-footer a { color: var(--accent); transition: opacity 150ms; }
    .err-footer a:hover { opacity: 0.7; }
  </style>
</head>
<body>

  <div class="page-404">
    <p class="err-code">404</p>
    <hr class="err-rule">
    <h1 class="err-heading">I've looked here and there and everywhere.</h1>
    <p class="err-desc">Yo... This page doesn't exist lil dude.</p>

    <div class="err-actions">
      <a href="/" class="err-btn err-btn-primary">Return home ↩</a>
      <a href="javascript:history.back()" class="err-btn err-btn-secondary">Go back</a>
    </div>

    <div class="err-path">
      <span class="err-path-label">Path</span>
      <span class="err-path-value" id="err-path-value"></span>
    </div>

    <footer class="err-footer">
      <p>&copy; <span id="err-year"></span> ContentLTD. All rights reserved.</p>
      <p>Questions? <a href="mailto:info@contentltd.net">info@contentltd.net</a></p>
    </footer>
  </div>

  <script>
    document.getElementById('err-path-value').textContent = window.location.pathname;
    document.getElementById('err-year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
